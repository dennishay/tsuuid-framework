name: TSUUID768
options:
  bundleIdPrefix: com.tsuuid
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
packages:
  TSUUIDKit:
    path: ../TSUUIDKit
  SwiftyDropbox:
    url: https://github.com/dropbox/SwiftyDropbox.git
    from: "10.0.0"
targets:
  TSUUID768:
    type: application
    platform: iOS
    sources:
      - TSUUID768
      - path: ../models/LaBSE-full.mlmodelc
        buildPhase: resources
        type: folder
      - path: ../models/CLIP-full.mlmodelc
        buildPhase: resources
        type: folder
      - path: ../models/checkpoint-10k.db
        buildPhase: resources
        type: file
    dependencies:
      - package: TSUUIDKit
      - package: SwiftyDropbox
        product: SwiftyDropbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tsuuid.768
        DEVELOPMENT_TEAM: TRB44FFLZ9
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: TSUUID768/Info.plist
        SWIFT_STRICT_CONCURRENCY: complete
    entitlements:
      path: TSUUID768/TSUUID768.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.tsuuid.768
